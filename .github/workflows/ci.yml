name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build:all

      - name: Verify cdn/ is up to date
        run: |
          git diff --exit-code cdn/ || {
            echo "::error::cdn/ is out of date. Run 'npm run build:all' and commit the cdn/ changes."
            exit 1
          }
